# CI: compile (including the Rust/HiGHS build) and run the suite on Linux.
#
# Self-gating makes this work without any secrets or solver installs:
# - oracle tests self-exclude (no standalone HiGHS binary on the runner)
# - :gurobi tests self-exclude (GUROBI_HOME unset, so the Gurobi crate is
#   not compiled and the backend reports unavailable)
# The first uncached run builds HiGHS from source via CMake (minutes);
# rust-cache makes later runs fast.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # CI always builds the HiGHS NIF from source: release binaries may
      # not exist yet for the version under test, and the source path is
      # exactly what this workflow is here to prove
      FORCE_OPTEX_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      # mirrors the development toolchain (Elixir 1.20.2 / OTP 29)
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20.2"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/optex_highs

      # priv/native must be cached with _build: Rustler drops the compiled
      # NIF there, and a cached _build whose manifests say "up to date"
      # skips the Rustler compile entirely, leaving a fresh checkout without
      # the .so (this exact failure happened on the first cached run, on a
      # commit that touched only examples/)
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/native
          # v2: caches are immutable per key; bumped when the cached path
          # set changed (priv/native added)
          key: mix-v2-${{ runner.os }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix test
