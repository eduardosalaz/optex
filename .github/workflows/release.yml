# Builds the precompiled HiGHS NIF for every supported target and attaches
# the tarballs to the GitHub release for the pushed tag. Every target uses
# a NATIVE runner (including arm Linux and arm macOS), so the CMake-built
# HiGHS C++ tree is never cross-compiled.
#
# Release runbook (also in CLAUDE.md):
#   1. bump @version in mix.exs, update CHANGELOG.md, commit
#   2. git tag vX.Y.Z && git push --tags
#   3. wait for this workflow to attach all five artifacts to the release
#   4. mix rustler_precompiled.download Optex.Solver.HiGHS.Native --all --print
#      (writes checksum-Elixir.Optex.Solver.HiGHS.Native.exs, shipped in
#      the Hex package but gitignored)
#   5. mix hex.publish

name: Release NIFs

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_release:
    name: ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04-arm }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }

    steps:
      - uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs)" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      # bindgen (via highs-sys) needs libclang; the Windows runner image
      # ships LLVM but does not export the path
      - name: Point bindgen at libclang (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> $GITHUB_ENV

      - name: Build the HiGHS NIF
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: optex_highs
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: "2.15"
          use-cross: false
          project-dir: "native/optex_highs"

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.build-crate.outputs.file-path }}
