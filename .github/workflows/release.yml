# Builds the precompiled HiGHS NIF for every supported target and attaches
# the tarballs to the GitHub release for the pushed tag. Every target uses
# a NATIVE runner (including arm Linux and arm macOS), so the CMake-built
# HiGHS C++ tree is never cross-compiled.
#
# Release runbook (also in CLAUDE.md):
#   1. bump @version in mix.exs, update CHANGELOG.md, commit
#   2. git tag vX.Y.Z && git push --tags
#   3. wait for this workflow to attach all five artifacts to the release
#   4. mix rustler_precompiled.download Optex.Solver.HiGHS.Native --all --print
#      (writes checksum-Elixir.Optex.Solver.HiGHS.Native.exs, shipped in
#      the Hex package but gitignored)
#   5. mix hex.publish

name: Release NIFs

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build_release:
    name: ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04-arm }
          # macos-13 (the old Intel label) was retired 2025-12-04;
          # macos-15-intel is the standard-runner x86_64 label. GitHub has
          # announced Intel macOS retires entirely with macos-15 in fall
          # 2027; drop this target from the matrix then.
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }

    steps:
      - uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs)" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      # bindgen (via highs-sys) needs libclang; the Windows runner image
      # ships LLVM but does not export the path
      - name: Point bindgen at libclang (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> $GITHUB_ENV

      # Every runner is native for its target, so the build is a plain
      # cargo invocation followed by rustler_precompiled's naming
      # convention: <lib-prefix><crate>-v<version>-nif-<nif>-<target><ext>
      # inside a .tar.gz of the same name; "lib" prefix and ".so" extension
      # everywhere except Windows ("" and ".dll"); macOS dylibs are RENAMED
      # to .so, which is what the Erlang loader and rustler_precompiled
      # expect. (The philss action was dropped: v1.1.4 unconditionally
      # installed the cross tool, which broke macOS/Windows tar and arm
      # Linux; none of the runners here needs cross at all.)
      - name: Build the HiGHS NIF
        shell: bash
        working-directory: native/optex_highs
        run: cargo build --release --target ${{ matrix.job.target }}

      - name: Package for rustler_precompiled
        id: package
        shell: bash
        run: |
          NIF_VERSION="2.15"
          TARGET="${{ matrix.job.target }}"

          case "$TARGET" in
            *windows*)
              SRC="optex_highs.dll"
              NAME="optex_highs-v${PROJECT_VERSION}-nif-${NIF_VERSION}-${TARGET}.dll"
              ;;
            *apple*)
              SRC="liboptex_highs.dylib"
              NAME="liboptex_highs-v${PROJECT_VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
              ;;
            *)
              SRC="liboptex_highs.so"
              NAME="liboptex_highs-v${PROJECT_VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
              ;;
          esac

          cp "native/optex_highs/target/${TARGET}/release/${SRC}" "${NAME}"
          tar -czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" || certutil -hashfile "${NAME}.tar.gz" SHA256
          echo "file-path=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.package.outputs.file-path }}
